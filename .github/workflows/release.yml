name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Start Postgres
        id: postgres
        run: |
          CONTAINER="dispatch-ci-pg-$GITHUB_RUN_ID"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"
          # Pick a random port in 10000-20000 range
          PORT=$((RANDOM % 10000 + 10000))
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          docker run --rm -d \
            --name "$CONTAINER" \
            -e POSTGRES_USER=dispatch \
            -e POSTGRES_PASSWORD=dispatch \
            -e POSTGRES_DB=postgres \
            -p "$PORT":5432 \
            postgres:17-alpine
          # Wait for Postgres to be ready
          for i in $(seq 1 15); do
            docker exec "$CONTAINER" pg_isready -U dispatch && break
            sleep 1
          done

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint:web

      - name: Test
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://dispatch:dispatch@127.0.0.1:${{ steps.postgres.outputs.port }}/postgres

      - name: Build
        run: npm run build

      - name: Stop Postgres
        if: always()
        run: docker stop ${{ steps.postgres.outputs.container }} 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ inputs.version }} --no-git-tag-version)
          # Also bump web package to keep versions in sync
          npm --prefix web version ${{ inputs.version }} --no-git-tag-version
          git add package.json package-lock.json web/package.json web/package-lock.json
          git commit -m "Release ${NEW_VERSION}"
          git tag -a "${NEW_VERSION}" -m "Release ${NEW_VERSION}"
          git push origin main --follow-tags
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Release ${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      tag: ${{ steps.version.outputs.tag }}
