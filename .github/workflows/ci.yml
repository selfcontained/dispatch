name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Start Postgres
        id: postgres
        run: |
          CONTAINER="dispatch-ci-pg-$GITHUB_RUN_ID"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"
          # Pick a random port in 10000-20000 range
          PORT=$((RANDOM % 10000 + 10000))
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          docker run --rm -d \
            --name "$CONTAINER" \
            -e POSTGRES_USER=dispatch \
            -e POSTGRES_PASSWORD=dispatch \
            -e POSTGRES_DB=postgres \
            -p "$PORT":5432 \
            postgres:17-alpine
          # Wait for Postgres to be ready
          for i in $(seq 1 15); do
            docker exec "$CONTAINER" pg_isready -U dispatch && break
            sleep 1
          done

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint:web

      - name: Test
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://dispatch:dispatch@127.0.0.1:${{ steps.postgres.outputs.port }}/postgres

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Create CI test database
        run: |
          docker exec ${{ steps.postgres.outputs.container }} \
            psql -U dispatch -d postgres -c "CREATE DATABASE dispatch_ci;"

      - name: E2E tests
        run: npx playwright test
        env:
          CI: "true"
          E2E_PORT: "8799"
          DATABASE_URL: postgres://dispatch:dispatch@127.0.0.1:${{ steps.postgres.outputs.port }}/dispatch_ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Stop Postgres
        if: always()
        run: docker stop ${{ steps.postgres.outputs.container }} 2>/dev/null || true
